<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Vicente Humberto Monteverde</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --gold: #b8963e;
    --gold-light: #d4af6a;
    --cream: #f7f3ed;
    --slate: #3a4a5c;
    --muted: #8a9ab0;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--navy); color: var(--cream); font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 70% 20%, rgba(184,150,62,0.07) 0%, transparent 60%), radial-gradient(ellipse 60% 80% at 10% 80%, rgba(58,74,92,0.4) 0%, transparent 60%); pointer-events: none; z-index: 0; }

  /* LANGUAGE SWITCHER */
  .lang-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(13,27,42,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(184,150,62,0.2); display: flex; justify-content: center; gap: 4px; padding: 10px 20px; }
  .lang-btn { background: transparent; border: 1px solid transparent; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; cursor: pointer; border-radius: 2px; transition: all 0.25s; }
  .lang-btn:hover { color: var(--gold-light); border-color: rgba(184,150,62,0.3); }
  .lang-btn.active { color: var(--gold); border-color: var(--gold); background: rgba(184,150,62,0.08); }

  .container { max-width: 1100px; margin: 0 auto; padding: 100px 40px 60px; position: relative; z-index: 1; }

  .header-rule { display: flex; align-items: center; gap: 18px; margin-bottom: 56px; opacity: 0; animation: fadeUp 0.8s ease forwards; }
  .header-rule span { font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
  .rule { flex: 1; height: 1px; background: linear-gradient(to right, var(--gold), transparent); }

  .hero { display: grid; grid-template-columns: 280px 1fr; gap: 60px; align-items: start; margin-bottom: 80px; opacity: 0; animation: fadeUp 0.9s 0.15s ease forwards; }
  .photo-frame { position: relative; width: 260px; height: 280px; }
  .photo-frame::before { content: ''; position: absolute; inset: -8px -8px 8px 8px; border: 1px solid var(--gold); opacity: 0.4; border-radius: 2px; }
  .photo-frame::after { content: ''; position: absolute; bottom: -16px; left: -16px; width: 70px; height: 70px; border-left: 2px solid var(--gold); border-bottom: 2px solid var(--gold); opacity: 0.6; }
  .photo-frame img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; filter: grayscale(15%) contrast(1.05); border-radius: 2px; }
  .hero-text { padding-top: 8px; }
  .prefix { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); font-weight: 400; margin-bottom: 10px; }
  .name { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 4vw, 52px); font-weight: 300; line-height: 1.1; color: var(--white); margin-bottom: 6px; }
  .name em { font-style: italic; color: var(--gold-light); }
  .title-tag { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 400; margin-bottom: 28px; }
  .divider-gold { width: 48px; height: 2px; background: linear-gradient(to right, var(--gold), var(--gold-light)); margin-bottom: 28px; }
  .bio-text { font-size: 15.5px; line-height: 1.85; color: rgba(247,243,237,0.82); font-weight: 300; max-width: 560px; }
  .bio-text strong { color: var(--cream); font-weight: 500; }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: rgba(184,150,62,0.15); border: 1px solid rgba(184,150,62,0.2); margin-bottom: 72px; opacity: 0; animation: fadeUp 0.9s 0.3s ease forwards; }
  .metric-item { background: rgba(13,27,42,0.8); padding: 28px 24px; text-align: center; transition: background 0.3s; }
  .metric-item:hover { background: rgba(184,150,62,0.06); }
  .metric-num { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; color: var(--gold-light); line-height: 1; margin-bottom: 6px; }
  .metric-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 400; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-bottom: 72px; opacity: 0; animation: fadeUp 0.9s 0.45s ease forwards; }
  .section-label { font-size: 10px; letter-spacing: 3.5px; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(184,150,62,0.25); }
  .competency-item { margin-bottom: 20px; padding-left: 16px; border-left: 1px solid rgba(184,150,62,0.25); transition: border-color 0.3s; }
  .competency-item:hover { border-left-color: var(--gold); }
  .comp-title { font-size: 13.5px; font-weight: 500; color: var(--cream); margin-bottom: 4px; }
  .comp-desc { font-size: 13px; color: var(--muted); line-height: 1.6; font-weight: 300; }
  .achievement-item { display: flex; gap: 16px; margin-bottom: 20px; align-items: flex-start; }
  .ach-icon { width: 32px; height: 32px; border: 1px solid rgba(184,150,62,0.35); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; color: var(--gold-light); margin-top: 2px; }
  .ach-text { font-size: 13.5px; color: rgba(247,243,237,0.78); line-height: 1.6; font-weight: 300; }
  .ach-text strong { color: var(--cream); font-weight: 500; }

  .bottom-badge { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 24px; border: 1px solid rgba(184,150,62,0.2); opacity: 0; animation: fadeUp 0.9s 0.6s ease forwards; flex-wrap: wrap; }
  .badge-sep { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; opacity: 0.5; }
  .badge-text { font-size: 12px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; }
  .badge-text span { color: var(--gold-light); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 768px) {
    .hero { grid-template-columns: 1fr; }
    .photo-frame { width: 200px; height: 220px; margin: 0 auto; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
    .container { padding: 80px 24px 40px; }
  }
</style>
</head>

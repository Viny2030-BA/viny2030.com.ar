<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir Comprobante - VINY 2030</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --bg: #0d1f35;
  --surface: #1a3a5c;
  --surface2: #152e4a;
  --border: #2a4f72;
  --text: #e8e0d0;
  --muted: #7a9ab8;
}
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.logo { text-align: center; margin-bottom: 30px; }
.logo h1 {
  font-family: 'Playfair Display', serif;
  color: var(--gold);
  font-size: 32px;
  letter-spacing: 6px;
}
.logo p { color: var(--muted); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }
h2 { color: var(--text); font-size: 18px; margin-bottom: 24px; text-align: center; font-family: 'Playfair Display', serif; }
.form-group { margin-bottom: 18px; }
label { color: var(--muted); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 6px; }
input[type="text"], input[type="email"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Barlow', sans-serif;
  transition: border 0.2s;
  outline: none;
}
input[type="text"]::placeholder, input[type="email"]::placeholder { color: var(--muted); opacity: 0.6; }
input[type="text"]:focus, input[type="email"]:focus { border-color: var(--gold); }
.upload-area {
  border: 2px dashed var(--border);
  border-radius: 10px;
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  background: var(--surface2);
}
.upload-area:hover, .upload-area.dragover {
  border-color: var(--gold);
  background: rgba(201,168,76,0.05);
}
.upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 36px; margin-bottom: 10px; }
.upload-area p { color: var(--muted); font-size: 13px; }
.upload-area .filename { color: var(--gold); margin-top: 8px; font-size: 13px; }
button[type="submit"] {
  width: 100%;
  background: var(--gold);
  color: #0d1f35;
  border: none;
  padding: 15px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  font-family: 'Barlow', sans-serif;
  transition: background 0.2s, transform 0.2s;
}
button[type="submit"]:hover { background: var(--gold-light); transform: translateY(-1px); }
button[type="submit"]:disabled { background: var(--border); cursor: not-allowed; transform: none; color: var(--muted); }
.alert { padding: 14px 18px; border-radius: 8px; margin-top: 16px; font-size: 14px; display: none; }
.alert.success { background: rgba(50,180,50,0.08); color: #6bc96b; border: 1px solid rgba(50,180,50,0.2); }
.alert.error { background: rgba(220,50,50,0.08); color: #e06060; border: 1px solid rgba(220,50,50,0.2); }
.code-badge {
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 8px;
  padding: 10px 16px;
  text-align: center;
  margin-bottom: 20px;
}
.code-badge span { color: var(--gold); font-size: 18px; font-weight: bold; letter-spacing: 2px; font-family: monospace; }
.code-badge p { color: var(--muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>VINY 2030</h1>
    <p>Sistema de pagos</p>
  </div>
  <h2>📤 Subir comprobante de pago</h2>
  <div class="code-badge" id="codeBadge" style="display:none">
    <span id="codeDisplay"></span>
    <p>Código de tu orden</p>
  </div>
  <form id="uploadForm">
    <div class="form-group">
      <label>Código de orden *</label>
      <input type="text" id="orderCode" name="orderCode" placeholder="VNY-2026-0001" required style="text-transform:uppercase;letter-spacing:2px;">
    </div>
    <div class="form-group">
      <label>Tu nombre</label>
      <input type="text" id="nombre" name="nombre" placeholder="Nombre completo">
    </div>
    <div class="form-group">
      <label>Tu email</label>
      <input type="email" id="email" name="email" placeholder="tu@email.com">
    </div>
    <div class="form-group">
      <label>Comprobante de pago *</label>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" name="comprobante" accept=".jpg,.jpeg,.png,.pdf,.webp" required>
        <div class="upload-icon">📎</div>
        <p>Arrastrá o hacé click para seleccionar</p>
        <p style="font-size:11px;margin-top:4px;letter-spacing:1px;">JPG · PNG · PDF hasta 10MB</p>
        <div class="filename" id="fileName"></div>
      </div>
    </div>
    <button type="submit" id="submitBtn">Enviar comprobante</button>
    <div class="alert success" id="successMsg">✅ ¡Comprobante recibido! Te avisamos cuando confirmemos el pago.</div>
    <div class="alert error" id="errorMsg"></div>
  </form>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const codigoParam = params.get('codigo');
if (codigoParam) {
  document.getElementById('orderCode').value = codigoParam.toUpperCase();
  document.getElementById('codeDisplay').textContent = codigoParam.toUpperCase();
  document.getElementById('codeBadge').style.display = 'block';
}
document.getElementById('fileInput').addEventListener('change', function() {
  const name = this.files[0]?.name || '';
  document.getElementById('fileName').textContent = name ? `✓ ${name}` : '';
});
const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', () => uploadArea.classList.add('dragover'));
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', () => uploadArea.classList.remove('dragover'));
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  const formData = new FormData(e.target);
  try {
    const res = await fetch('/api/comprobante', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.success) {
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
      e.target.reset();
      document.getElementById('fileName').textContent = '';
      btn.textContent = '✅ Enviado';
    } else {
      throw new Error(data.error || 'Error desconocido');
    }
  } catch (err) {
    document.getElementById('errorMsg').textContent = `❌ Error: ${err.message}`;
    document.getElementById('errorMsg').style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Enviar comprobante';
  }
});
</script>
</body>
</html>
